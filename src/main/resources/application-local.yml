spring:
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/XEPDB1
    username: EXPERIAN
    password: 2064
    driver-class-name: oracle.jdbc.OracleDriver
    
  kafka:
    bootstrap-servers: localhost:9092   # si corre en Docker
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer      
      # Idempotencia (evita duplicados)
      enable.idempotence: true
      # Acks fuertes: el broker confirma cuando TODOS los replicas escriben
      acks: all
      # Retries automáticos
      retries: 5
      # Timeout total de entrega
      delivery.timeout.ms: 120000
      # Timeout por request
      request.timeout.ms: 30000
      # Compresión (reduce tamaño y coste)
      compression.type: snappy
      # Batch para mejorar rendimiento
      linger.ms: 5
      batch.size: 32768
    consumer:
      group-id: integracion-experian
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    
  jpa:
    show-sql: true
    properties:
     hibernate:
        format_sql: true
        
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

 
api:
  experian:
    base-url: http://localhost:6100/experian
    pf-url: /physical-person-query
    pj-url: /legal-person-query
    timeoutrequest: 15000
    timeoutresponse: 15000
  callback:
    url: https://mi-micro/api/experian/eventos
  credentials:
    user: xxx
    password: yyy
  orquestador:
    base-url: http://localhost:6000
    eventos-url: /experian/eventos
  
    
  

  